<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; object-src 'none'; base-uri 'self'; form-action 'self' https:;">
  <title>Menu Terraza | Bebidas y productos</title>
  <meta name="description" content="Menu publico de productos y precios de la terraza.">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08070a;
      --panel: rgba(20, 18, 16, 0.86);
      --panel-strong: rgba(33, 26, 20, 0.94);
      --line: rgba(245, 158, 11, 0.24);
      --gold: #fbbf24;
      --amber: #f59e0b;
      --cream: #fff7ed;
      --muted: #d6c4a9;
      --soft: rgba(255, 247, 237, 0.72);
      --danger: #fca5a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--cream);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.22), transparent 34rem),
        radial-gradient(circle at 85% 18%, rgba(146, 64, 14, 0.24), transparent 30rem),
        linear-gradient(135deg, rgba(8, 7, 10, 0.86), rgba(8, 7, 10, 0.96)),
        url("https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=1800&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 72%);
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .page {
      position: relative;
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .hero {
      min-height: 310px;
      max-width: 100%;
      border: 1px solid rgba(251, 191, 36, 0.28);
      border-radius: 20px;
      padding: clamp(22px, 5vw, 46px);
      background:
        linear-gradient(135deg, rgba(9, 9, 11, 0.86), rgba(35, 24, 12, 0.72)),
        url("https://images.unsplash.com/photo-1532635241-17e820acc59f?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .hero-content {
      max-width: 760px;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      border: 1px solid rgba(251, 191, 36, 0.34);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(0, 0, 0, 0.32);
      color: #fde68a;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2.65rem, 9vw, 6.4rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      overflow-wrap: anywhere;
    }

    .hero p {
      max-width: 620px;
      margin: 18px 0 0;
      color: rgba(255, 247, 237, 0.86);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .toolbar {
      display: grid;
      max-width: 100%;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(9, 9, 11, 0.72);
      backdrop-filter: blur(14px);
    }

    .search {
      width: 100%;
      border: 1px solid rgba(251, 191, 36, 0.26);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      background: rgba(255, 247, 237, 0.08);
      color: var(--cream);
    }

    .search::placeholder { color: rgba(255, 247, 237, 0.52); }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px;
    }

    .chip {
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 999px;
      padding: 10px 13px;
      background: rgba(255, 247, 237, 0.08);
      color: var(--muted);
      font-weight: 850;
      white-space: nowrap;
    }

    .chip.active {
      background: linear-gradient(135deg, #f59e0b, #facc15);
      border-color: transparent;
      color: #1c1208;
    }

    .status-box {
      display: none;
      margin: 18px 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: rgba(9, 9, 11, 0.76);
      color: var(--muted);
    }

    .status-box.show { display: block; }
    .status-box.error { border-color: rgba(252, 165, 165, 0.38); color: var(--danger); }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 16px;
    }

    .beer-card {
      position: relative;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      display: flex;
      flex-direction: column;
    }

    .beer-media {
      margin: 0;
      min-height: 178px;
      aspect-ratio: 4 / 3;
      padding: 12px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 247, 237, 0.28), transparent 40%),
        linear-gradient(135deg, rgba(255, 247, 237, 0.16), rgba(0,0,0,0.48)),
        url("https://images.unsplash.com/photo-1608270586620-248524c67de9?auto=format&fit=crop&w=900&q=80");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(251, 191, 36, 0.14);
    }

    .beer-media.has-image {
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 247, 237, 0.65), transparent 48%),
        linear-gradient(135deg, #f8f2e8, #d7c0a0);
    }

    .beer-media img {
      width: 100%;
      height: 100%;
      min-width: 0;
      max-height: 210px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.44));
      border-radius: 10px;
    }

    .beer-media-placeholder {
      width: 100%;
      height: 100%;
      min-height: 146px;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.18), rgba(0,0,0,0.64)),
        url("https://images.unsplash.com/photo-1608270586620-248524c67de9?auto=format&fit=crop&w=900&q=80");
      background-size: cover;
      background-position: center;
    }

    .beer-body {
      flex: 1;
      padding: 14px;
    }

    .beer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .beer-title {
      min-width: 0;
      margin: 0;
      color: var(--cream);
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.22;
    }

    .price {
      flex: 0 0 auto;
      color: #fde68a;
      font-size: 1.18rem;
      font-weight: 950;
      text-align: right;
    }

    .category {
      display: inline-flex;
      margin-top: 10px;
      border: 1px solid rgba(251, 191, 36, 0.22);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--gold);
      background: rgba(251, 191, 36, 0.08);
      font-size: 0.78rem;
      font-weight: 850;
    }

    .description {
      min-height: 34px;
      margin: 11px 0 0;
      color: var(--soft);
      font-size: 0.9rem;
      line-height: 1.42;
    }

    .addons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .addon {
      border-radius: 10px;
      padding: 7px 9px;
      background: rgba(255, 247, 237, 0.09);
      color: #ffedd5;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .addon.soldout {
      color: #fecaca;
      background: rgba(127, 29, 29, 0.34);
    }

    .empty {
      grid-column: 1 / -1;
      border: 1px dashed rgba(251, 191, 36, 0.34);
      border-radius: 16px;
      padding: 28px;
      background: rgba(9, 9, 11, 0.72);
      color: var(--muted);
      text-align: center;
    }

    .footer {
      margin: 24px 0 0;
      color: rgba(255, 247, 237, 0.62);
      text-align: center;
      font-size: 0.86rem;
    }

    @media (max-width: 760px) {
      body { background-attachment: scroll; }
      .page { width: min(1160px, calc(100% - 18px)); padding-top: 9px; }
      .hero { min-height: 270px; border-radius: 16px; }
      .toolbar { grid-template-columns: 1fr; }
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .beer-card {
        border-radius: 14px;
      }
      .beer-media {
        min-height: 210px;
        aspect-ratio: 16 / 11;
        padding: 14px;
      }
      .beer-media img {
        max-height: 240px;
      }
      .beer-top {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .beer-title {
        font-size: 1rem;
      }
      .price {
        font-size: 1.08rem;
        text-align: left;
      }
    }

    @media (max-width: 420px) {
      .page { width: min(1160px, calc(100% - 14px)); }
      .hero {
        min-height: 238px;
        padding: 20px;
      }
      .hero-content {
        width: 100%;
        max-width: calc(100vw - 54px);
      }
      h1 {
        font-size: clamp(2rem, 10vw, 2.72rem);
        line-height: 0.98;
      }
      .hero p {
        max-width: 100%;
        font-size: 0.95rem;
        line-height: 1.45;
      }
      .beer-media {
        min-height: 190px;
        aspect-ratio: 1 / 1;
      }
      .beer-body {
        padding: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-content">
        <p class="eyebrow">Terraza Bar</p>
        <h1 id="hotel-name">Menu de Terraza</h1>
        <p id="hero-copy">Bebidas, licores, micheladas y precios actualizados para disfrutar en la terraza.</p>
      </div>
    </section>

    <section class="toolbar" aria-label="Filtros del menu">
      <input id="search-input" class="search" type="search" placeholder="Buscar producto, licor, cerveza o categoria...">
      <div id="category-tabs" class="chip-row" aria-label="Categorias"></div>
    </section>

    <div id="status-box" class="status-box show">Cargando menu de terraza...</div>
    <section id="menu-grid" class="menu-grid" aria-live="polite"></section>
    <p class="footer">Precios sujetos a disponibilidad. Consulta al equipo de terraza para promociones del dia.</p>
  </main>

  <script type="module" src="/js/public/menu-terraza.js"></script>
</body>
</html>
